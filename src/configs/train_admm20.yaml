defaults:
  - model: admm20
  - writer: cometml
  - metrics: reconstruction
  - datasets: digicam
  - dataloader: digicam
  - transforms: none_transforms
  - _self_

optimizer:
  _target_: torch.optim.Adam
  lr: 3.0e-4

lr_scheduler:
  _target_: torch.optim.lr_scheduler.StepLR
  gamma: 0.8
  step_size: ${trainer.epoch_len}

loss_function:
  _target_: src.loss.mse_roi.MseRoiLoss

trainer:
  log_step: 10
  n_epochs: 50
  epoch_len: 200
  max_grad_norm: 1.0
  device_tensors: ["lensless", "psf", "lensed_roi"]
  resume_from: null
  device: auto
  override: false
  monitor: "max val_psnr"
  save_period: 5
  early_stop: 50
  save_dir: saved
  seed: 1

dataloader:
  batch_size: 1
  num_workers: 0
  pin_memory: true

writer:
  project_name: dl-unrolled-admm
  run_name: admm20-first-try
  mode: online
  loss_names: ["loss"]
